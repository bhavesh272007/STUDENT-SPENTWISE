<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpendWise Pro | Advanced Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.3);
            --primary-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        body { 
            background: #f0f2f5; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.3s ease;
        }

        body.dark-mode {
            background: #0f172a;
            color: #f8fafc;
        }

        .dark-mode .card {
            background: rgba(30, 41, 59, 0.7);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .hero-section {
            background: var(--primary-grad);
            color: white;
            padding: 2rem;
            border-radius: 0 0 40px 40px;
            margin-bottom: -40px;
        }

        .btn-add {
            background: var(--primary-grad);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            padding: 12px;
        }

        .progress { height: 12px; border-radius: 10px; background: #e2e8f0; }
        .progress-bar { background: var(--primary-grad); }

        .transaction-item {
            transition: 0.2s;
            border: none;
            border-radius: 16px;
            margin-bottom: 10px;
        }
        
        .transaction-item:hover { transform: scale(1.02); }
    </style>
</head>
<body id="body">

<div class="hero-section text-center shadow-lg">
    <div class="d-flex justify-content-between container mb-3">
        <span class="fw-bold">SpendWise v2.0</span>
        <button class="btn btn-sm btn-light rounded-pill" onclick="toggleDarkMode()">🌙 Theme</button>
    </div>
    <h2 class="fw-800">₹<span id="totalDisplay">0</span></h2>
    <p class="opacity-75">Total Spent This Month</p>
</div>

<div class="container mt-5 pt-4">
    <div class="row g-4">
        <div class="col-12">
            <div class="card glass-card p-4">
                <div class="d-flex justify-content-between mb-2">
                    <span class="fw-bold">Monthly Budget Goal</span>
                    <span id="percentLabel">0%</span>
                </div>
                <div class="progress mb-2">
                    <div id="budgetBar" class="progress-bar" role="progressbar" style="width: 0%"></div>
                </div>
                <small class="text-muted">Limit: ₹5,000 (Tap to change in code)</small>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card glass-card p-4 h-100">
                <h5 class="mb-4 fw-bold">Add Transaction</h5>
                <input type="text" id="itemName" class="form-control mb-3 border-0 bg-light p-3" placeholder="What did you buy?">
                <input type="number" id="itemAmount" class="form-control mb-3 border-0 bg-light p-3" placeholder="Amount (₹)">
                <select id="itemCategory" class="form-select mb-4 border-0 bg-light p-3">
                    <option value="Food">🍕 Food & Canteen</option>
                    <option value="Travel">⛽ Petrol & Travel</option>
                    <option value="Academic">📖 Books & Xerox</option>
                    <option value="Personal">🛍️ Personal</option>
                </select>
                <button onclick="addExpense()" class="btn btn-add w-100 shadow">Add Expense</button>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card glass-card p-4 h-100">
                <h5 class="mb-4 fw-bold">Spending Analytics</h5>
                <canvas id="expenseChart" style="max-height: 250px;"></canvas>
            </div>
        </div>

        <div class="col-12 mb-5">
            <div class="card glass-card p-4">
                <div class="d-flex justify-content-between mb-4">
                    <h5 class="fw-bold m-0">Recent Activity</h5>
                    <button onclick="downloadCSV()" class="btn btn-sm btn-outline-primary rounded-pill">Export Excel</button>
                </div>
                <div id="expenseList"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let myChart;
    const BUDGET_LIMIT = 5000;

    window.onload = () => {
        initChart();
        updateUI();
    };

    function toggleDarkMode() {
        document.getElementById('body').classList.toggle('dark-mode');
    }

    function addExpense() {
        const name = document.getElementById('itemName').value;
        const amount = parseFloat(document.getElementById('itemAmount').value);
        const cat = document.getElementById('itemCategory').value;
        
        if(!name || !amount) return alert("Please fill details!");

        const expenses = JSON.parse(localStorage.getItem('adv_budget')) || [];
        expenses.push({ name, amount, cat, date: new Date().toLocaleDateString() });
        localStorage.setItem('adv_budget', JSON.stringify(expenses));

        document.getElementById('itemName').value = '';
        document.getElementById('itemAmount').value = '';
        updateUI();
    }

    function updateUI() {
        const expenses = JSON.parse(localStorage.getItem('adv_budget')) || [];
        const list = document.getElementById('expenseList');
        let total = 0;
        let stats = { Food: 0, Travel: 0, Academic: 0, Personal: 0 };

        list.innerHTML = '';
        expenses.reverse().forEach(e => {
            total += e.amount;
            stats[e.cat] += e.amount;
            list.innerHTML += `
                <div class="card transaction-item p-3 mb-2 shadow-sm border-0">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="fw-bold">${e.name}</div>
                            <small class="text-muted">${e.cat} • ${e.date}</small>
                        </div>
                        <div class="fw-bold text-primary">₹${e.amount}</div>
                    </div>
                </div>`;
        });

        // Update Stats
        document.getElementById('totalDisplay').innerText = total.toLocaleString();
        
        // Progress Bar Logic
        const percent = Math.min((total / BUDGET_LIMIT) * 100, 100);
        document.getElementById('budgetBar').style.width = percent + '%';
        document.getElementById('percentLabel').innerText = Math.round(percent) + '%';
        if(percent > 80) document.getElementById('budgetBar').style.background = 'red';

        updateChart(stats);
    }

    function initChart() {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Food', 'Travel', 'Academic', 'Personal'],
                datasets: [{
                    data: [0, 0, 0, 0],
                    backgroundColor: ['#6366f1', '#a855f7', '#ec4899', '#f59e0b'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '70%', plugins: { legend: { position: 'bottom' } } }
        });
    }

    function updateChart(s) {
        myChart.data.datasets[0].data = [s.Food, s.Travel, s.Academic, s.Personal];
        myChart.update();
    }

    function downloadCSV() {
        const data = JSON.parse(localStorage.getItem('adv_budget')) || [];
        let csv = "Item,Category,Amount,Date\n";
        data.forEach(e => csv += `${e.name},${e.cat},${e.amount},${e.date}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'SpendWise_Report.csv';
        a.click();
    }
</script>
</body>
</html>
